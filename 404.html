<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | Nexus</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="src/css/base/tokens.css">
    <link rel="stylesheet" href="src/css/base/reset.css">
    <link rel="stylesheet" href="src/css/responsive.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div>
            <div class="error-code">404</div>
            <h1 style="font-size: 3rem; margin-bottom: 1.5rem;">Lost in the <span
                    style="color: var(--primary);">Cloud</span>?</h1>
            <p
                style="color: var(--text-muted); font-size: 1.25rem; margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                The page you're looking for doesn't exist or has been moved to a different orbit.</p>
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <a href="index.html" class="btn-primary">Back to Home</a>
                <a href="marketing/contact.html"
                    style="padding: 1rem 2.5rem; border: 1px solid var(--border); border-radius: 12px; font-weight: 600;">Report
                    Issue</a>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
