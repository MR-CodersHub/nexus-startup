<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Nexus</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="src/css/base/tokens.css">
    <link rel="stylesheet" href="src/css/base/reset.css">
    <link rel="stylesheet" href="src/css/responsive.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .soon-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>

<body>
    <div class="soon-container">
        <div class="container">
            <div style="margin-bottom: 3rem;">
                <a href="index.html" class="brand-text"
                    style="font-family: var(--font-heading); font-weight: 800; font-size: 2.5rem; color: #fff;">
                    <span style="color: var(--primary);">NEX</span>US
                </a>
            </div>
            <h1 style="font-size: 4rem; margin-bottom: 1.5rem;">Something <span
                    style="color: var(--primary);">Big</span> is Brewing.</h1>
            <p
                style="color: var(--text-muted); font-size: 1.25rem; margin-bottom: 4rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                We're putting the finishing touches on our latest integration. Enter your email to be the first to know
                when we launch.</p>

            <form style="display: flex; gap: 1rem; max-width: 500px; margin: 0 auto;">
                <input type="email" placeholder="name@company.com"
                    style="flex: 1; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff;">
                <button type="submit" class="btn-primary">Notify Me</button>
            </form>

            <div style="margin-top: 4rem; display: flex; justify-content: center; gap: 2rem;">
                <a href="#"><i data-lucide="twitter" style="color: var(--text-muted);"></i></a>
                <a href="#"><i data-lucide="github" style="color: var(--text-muted);"></i></a>
                <a href="#"><i data-lucide="linkedin" style="color: var(--text-muted);"></i></a>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
