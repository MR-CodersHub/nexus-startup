<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Nexus — Restricted Access</title>
    <meta name="description" content="Nexus administrator portal. Restricted access only.">
    <link rel="icon" href="../../assets/images/logo.png" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(245, 101, 101, 0.08);
            border-radius: 50%;
            filter: blur(120px);
            top: -100px;
            left: -100px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(251, 146, 60, 0.06);
            border-radius: 50%;
            filter: blur(120px);
            bottom: -80px;
            right: -80px;
            pointer-events: none;
            z-index: 0;
        }

        .back-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 100;
        }

        .back-link:hover {
            color: #94a3b8;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(245, 101, 101, 0.12);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(245, 101, 101, 0.04) inset;
        }

        .brand-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .brand-wrap img {
            height: 40px;
            width: auto;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: #6366f1;
        }

        .role-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #f87171;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            width: fit-content;
            margin: 0 auto 1.25rem;
        }

        .role-badge svg {
            width: 14px;
            height: 14px;
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .auth-sub {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .form-label label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-right: 2.75rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f8fafc;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .input-wrap input::placeholder {
            color: #475569;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.04);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
        }

        .eye-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
            transition: color 0.2s;
        }

        .eye-btn:hover {
            color: #94a3b8;
        }

        .eye-btn svg {
            width: 18px;
            height: 18px;
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #ef4444;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .error-msg.show {
            display: flex;
        }

        .error-msg svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(220, 38, 38, 0.4);
            filter: brightness(1.08);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .security-notice {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(251, 146, 60, 0.06);
            border: 1px solid rgba(251, 146, 60, 0.15);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: #fb923c;
            line-height: 1.5;
        }

        .security-notice svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .back-to-choice {
            text-align: center;
            margin-top: 1.25rem;
        }

        .back-to-choice a {
            color: #475569;
            font-size: 0.82rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-to-choice a:hover {
            color: #94a3b8;
        }

        .legal-links {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.2);
        }

        .legal-links a {
            color: inherit;
            text-decoration: none;
            margin: 0 0.4rem;
            transition: color 0.2s;
        }

        .legal-links a:hover {
            color: rgba(255, 255, 255, 0.4);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 0.9s linear infinite;
            transform-origin: center;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .auth-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <a href="../../login.html" class="back-link">
        <i data-lucide="arrow-left"></i> Back
    </a>

    <div class="auth-card">
        <a href="../../index.html" class="brand-wrap">
            <img src="../../assets/images/logo.png" alt="Nexus Logo" onerror="this.style.display='none'">
            <div class="brand-name"><span>NEX</span>US</div>
        </a>

        <div class="role-badge">
            <i data-lucide="shield-check"></i> Admin Portal
        </div>

        <h1 class="auth-title">Admin Access</h1>
        <p class="auth-sub">Restricted to authorised administrators only</p>

        <div class="error-msg" id="loginError">
            <i data-lucide="alert-circle"></i>
            <span id="errorText">Invalid admin credentials. Access denied.</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <div class="form-label">
                    <label for="email">Admin Email</label>
                </div>
                <div class="input-wrap">
                    <input type="email" id="email" placeholder="admin@company.com" autocomplete="email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="form-label">
                    <label for="password">Admin Password</label>
                </div>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                        required>
                    <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
                        <i data-lucide="eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i data-lucide="shield-check" style="width:18px;height:18px;"></i> Sign In as Admin
            </button>
        </form>

        <div class="security-notice">
            <i data-lucide="lock"></i>
            <span>This portal is monitored. Unauthorised access attempts are logged and reported.</span>
        </div>

        <div class="back-to-choice">
            <a href="../../login.html"><i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to login
                options</a>
        </div>
    </div>

    <div class="legal-links">
        <a href="../../public/pages/privacy-policy.html">Privacy</a> &bull;
        <a href="../../public/pages/terms-of-service.html">Terms</a>
    </div>

    <script src="../../src/js/auth.js"></script>
    <script>
        lucide.createIcons();

        // Password toggle
        const eyeBtn = document.getElementById('eyeBtn');
        const pwInput = document.getElementById('password');
        let showPw = false;
        eyeBtn.addEventListener('click', () => {
            showPw = !showPw;
            pwInput.type = showPw ? 'text' : 'password';
            document.getElementById('eyeIcon').setAttribute('data-lucide', showPw ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const submitBtn = document.getElementById('submitBtn');

            // Hide previous error
            errorEl.classList.remove('show');

            // Validate non-empty
            if (!email || !password) {
                document.getElementById('errorText').textContent = 'Please enter both email and password.';
                errorEl.classList.add('show');
                lucide.createIcons();
                return;
            }

            // Strict admin credential check
            if (email === 'admin@gmail.com' && password === 'admin123') {
                submitBtn.innerHTML = '<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Verifying...';
                submitBtn.disabled = true;

                setTimeout(() => {
                    if (typeof Auth !== 'undefined') {
                        Auth.login(email, 'admin');
                    } else {
                        window.location.href = 'admin-dashboard.html';
                    }
                }, 1000);
            } else {
                document.getElementById('errorText').textContent = 'Invalid admin credentials. Access denied.';
                errorEl.classList.add('show');
                lucide.createIcons();
                // Shake effect
                const card = document.querySelector('.auth-card');
                card.style.animation = 'none';
                card.style.animation = 'shake 0.4s ease';
            }
        });
    </script>
    <style>
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }
        }
    </style>
</body>

</html>
