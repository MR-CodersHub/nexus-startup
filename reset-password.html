<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Nexus</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <meta name="description" content="Reset your Nexus account password securely.">
    <link rel="stylesheet" href="src/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── Page Shell ── */
        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient glow blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.12);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.08);
            bottom: -80px;
            right: -80px;
        }

        /* ── Back Link ── */
        .back-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 100;
        }

        .back-link:hover {
            color: #94a3b8;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* ── Card ── */
        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        }

        /* ── Brand ── */
        .brand-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .brand-wrap img {
            height: 40px;
            width: auto;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: #6366f1;
        }

        /* ── Heading ── */
        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .auth-sub {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2.25rem;
            line-height: 1.5;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f8fafc;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .input-wrap input::placeholder {
            color: #475569;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.06);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* ── Primary Button ── */
        .btn-auth-primary {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
        }

        .btn-auth-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(99, 102, 241, 0.45);
            filter: brightness(1.08);
        }

        .btn-auth-primary:active {
            transform: translateY(0);
        }

        /* ── Footer ── */
        .auth-footer {
            text-align: center;
            color: #475569;
            font-size: 0.88rem;
            margin-top: 2rem;
        }

        .auth-footer a {
            color: #818cf8;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #a5b4fc;
        }

        /* ── Success State ── */
        #successState {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2.5rem 1.5rem;
                border-radius: 20px;
            }

            .auth-title {
                font-size: 1.5rem;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 0.9s linear infinite;
            transform-origin: center;
        }
    </style>
</head>

<body>
    <!-- Back to Login -->
    <a href="login.html" class="back-link">
        <i data-lucide="arrow-left"></i> Back to Login
    </a>

    <div class="auth-card">
        <!-- Brand Logo -->
        <a href="index.html" class="brand-wrap">
            <img src="assets/images/logo.png" alt="Nexus Logo" onerror="this.style.display='none'">
            <div class="brand-name"><span>NEX</span>US</div>
        </a>

        <div id="resetFormContainer">
            <h1 class="auth-title">Reset password</h1>
            <p class="auth-sub">Enter your email address and we'll send you a link to reset your password.</p>

            <form id="resetForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <div class="input-wrap">
                        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
                    </div>
                </div>

                <button type="submit" class="btn-auth-primary" id="submitBtn">Send Reset Link</button>
            </form>
        </div>

        <div id="successState">
            <div class="success-icon">
                <i data-lucide="mail" style="width: 32px; height: 32px;"></i>
            </div>
            <h2 class="auth-title">Check your email</h2>
            <p class="auth-sub">We've sent a password reset link to <strong id="sentEmail"></strong>. It will expire in
                1 hour.</p>
            <button type="button" class="btn-auth-primary" onclick="location.href='login.html'">Back to Login</button>
        </div>

        <p class="auth-footer">
            Remembered your password? <a href="login.html">Sign in</a>
        </p>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const formContainer = document.getElementById('resetFormContainer');
            const successState = document.getElementById('successState');
            const sentEmailSpan = document.getElementById('sentEmail');

            // Show loading state
            btn.innerHTML = '<span style="display:flex;align-items:center;justify-content:center;gap:8px;"><svg class="spin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Sending...</span>';
            btn.disabled = true;

            // Simulate API call
            setTimeout(() => {
                sentEmailSpan.textContent = email;
                formContainer.style.display = 'none';
                successState.style.display = 'block';
            }, 1500);
        });
    </script>
</body>

</html>
