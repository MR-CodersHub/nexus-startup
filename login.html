<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Nexus — Welcome Back</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    <meta name="description"
        content="Sign in to your Nexus account to manage your infrastructure, deployments, and global scaling tools.">
    <link rel="stylesheet" href="src/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── Page Shell ── */
        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient glow blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.12);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.08);
            bottom: -80px;
            right: -80px;
        }

        /* ── Back Link ── */
        .back-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 100;
        }

        .back-link:hover {
            color: #94a3b8;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* ── Card ── */
        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        }

        /* ── Brand ── */
        .brand-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .brand-wrap img {
            height: 40px;
            width: auto;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: #6366f1;
        }

        /* ── Heading ── */
        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .auth-sub {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2.25rem;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .form-label label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .form-label a {
            font-size: 0.82rem;
            color: #818cf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .form-label a:hover {
            color: #a5b4fc;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-right: 2.75rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f8fafc;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .input-wrap input::placeholder {
            color: #475569;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.06);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .eye-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
            transition: color 0.2s;
        }

        .eye-btn:hover {
            color: #94a3b8;
        }

        .eye-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ── Primary Button ── */
        .btn-auth-primary {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
        }

        .btn-auth-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(99, 102, 241, 0.45);
            filter: brightness(1.08);
        }

        .btn-auth-primary:active {
            transform: translateY(0);
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.75rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.07);
        }

        .divider-text {
            color: #475569;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ── Social Buttons ── */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .social-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ── Footer Cta ── */
        .auth-footer {
            text-align: center;
            color: #475569;
            font-size: 0.88rem;
            margin-top: 0.5rem;
        }

        .auth-footer a {
            color: #818cf8;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #a5b4fc;
        }

        /* ── Legal ── */
        .legal-links {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.2);
        }

        .legal-links a {
            color: inherit;
            text-decoration: none;
            margin: 0 0.4rem;
            transition: color 0.2s;
        }

        .legal-links a:hover {
            color: rgba(255, 255, 255, 0.4);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .auth-title {
                font-size: 1.5rem;
            }

            .social-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Back to Home -->
    <a href="index.html" class="back-link">
        <i data-lucide="arrow-left"></i> Home
    </a>

    <div class="auth-card">
        <!-- Brand Logo -->
        <a href="index.html" class="brand-wrap">
            <img src="assets/images/logo.png" alt="Nexus Logo" onerror="this.style.display='none'">
            <div class="brand-name"><span>NEX</span>US</div>
        </a>

        <div class="login-choice-section">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-sub">Choose how you'd like to sign in</p>
            <h2
                style="font-size: 1rem; color: #475569; text-align: center; margin-bottom: 1.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2rem;">
                Login As</h2>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="auth/user/user-login.html" class="btn-auth-primary"
                    style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <i data-lucide="user"></i> User Login
                </a>

                <a href="auth/admin/admin-login.html" class="btn-auth-primary"
                    style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: none;">
                    <i data-lucide="shield-check"></i> Admin Login
                </a>
            </div>
        </div>

        <p style="text-align:center;color:#475569;font-size:0.82rem;margin-top:1.75rem;">New to Nexus? <a
                href="signup.html" style="color:#818cf8;font-weight:600;text-decoration:none;">Create a free account</a>
        </p>
    </div>

    <div class="legal-links">
        <a href="public/pages/privacy-policy.html">Privacy</a> &bull;
        <a href="public/pages/terms-of-service.html">Terms</a> &bull;
        <a href="public/pages/security.html">Security</a>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="src/js/auth.js"></script>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 0.9s linear infinite;
            transform-origin: center;
        }
    </style>
</body>

</html>
